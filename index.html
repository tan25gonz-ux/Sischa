<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Sistema - Sucursales</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuración de tu proyecto Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCi409CkmXBbun7-POejbVaIiThK2nZ1JY",
            authDomain: "prestamos-18dd8.firebaseapp.com",
            projectId: "prestamos-18dd8",
            storageBucket: "prestamos-18dd8.firebasestorage.app",
            messagingSenderId: "921713515466",
            appId: "1:921713515466:web:0e2bcb5d67067068570d33"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Si ya hay una sesión activa de antes, lo mandamos directo al módulo de cierre
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "cierre.html";
            }
        });

        window.login = async () => {
            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const passInput = document.getElementById('pass').value;
            const btn = document.getElementById('btnLogin');

            if (!emailInput || !passInput) {
                alert("⚠️ Por favor, ingrese el correo y la contraseña.");
                return;
            }

            // Lista estricta de correos autorizados por sucursal
            const correosAutorizados = [
                "grupoperez@gmail.com",
                "grupoparaiso@gmail.com",
                "grupocartago@gmail.com"
            ];

            if (!correosAutorizados.includes(emailInput)) {
                alert("❌ Este correo no pertenece a ninguna sucursal activa del sistema.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Autenticando...";

            try {
                // Autenticación oficial contra Firebase Auth
                await signInWithEmailAndPassword(auth, emailInput, passInput);
                // El observador onAuthStateChanged se encargará de la redirección automática
            } catch (error) {
                alert("❌ Error de ingreso: " + error.message);
                btn.disabled = false;
                btn.innerText = "Ingresar al Sistema";
            }
        };
    </script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box { 
            background: white; 
            padding: 40px 30px; 
            width: 100%;
            max-width: 400px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #1a73e8;
            font-size: 24px;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        label { 
            font-size: 11px; 
            font-weight: bold; 
            color: #555; 
            display: block; 
            text-align: left;
            margin-top: 12px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        input:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 5px rgba(26,115,232,0.2);
        }
        .btn-blue { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 25px; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn-blue:hover {
            background: #1557b0;
        }
        .btn-blue:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .footer-logo {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>📝 Control de Sucursales</h2>
        <p>Inicie sesión con la cuenta asignada a su ubicación</p>
        
        <label>Correo Electrónico de la Sucursal</label>
        <input type="email" id="email" placeholder="ejemplo@sucursal.com" autocomplete="username">
        
        <label>Contraseña de Acceso</label>
        <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
        
        <button id="btnLogin" class="btn-blue" onclick="login()">Ingresar al Sistema</button>
        
        <div class="footer-logo">Sistema de Inventario y Finanzas v2.0</div>
    </div>

</body>
</html>
